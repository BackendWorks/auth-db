name: Deploy (Publish to GitHub Packages)

on:
    workflow_dispatch:
        inputs:
            bump:
                description: Version bump type
                required: true
                default: patch
                type: choice
                options: [patch, minor, major]
    push:
        branches: [main]
        paths:
            - "src/**"
            - "prisma/**"
            - "package.json"

jobs:
    publish:
        name: Build & Publish @backendworks/auth-db
        runs-on: ubuntu-latest

        permissions:
            contents: write # push version commit + tag
            packages: write # publish to GitHub Packages
            id-token: write # provenance attestation

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: https://npm.pkg.github.com
                  scope: "@backendworks"

            - name: Install dependencies
              run: npm ci
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Build
              run: npm run build

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Bump version
              id: bump
              run: |
                  BUMP="${{ github.event.inputs.bump || 'patch' }}"
                  npm version $BUMP --no-git-tag-version
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Commit & tag
              run: |
                  git add package.json
                  git commit -m "chore(release): @backendworks/auth-db@${{ steps.bump.outputs.version }}"
                  git tag "@backendworks/auth-db@${{ steps.bump.outputs.version }}"
                  git push origin HEAD --follow-tags
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

            - name: Publish to GitHub Packages
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: "@backendworks/auth-db@${{ steps.bump.outputs.version }}"
                  name: "@backendworks/auth-db v${{ steps.bump.outputs.version }}"
                  generate_release_notes: true
                  token: ${{ secrets.GH_TOKEN }}
